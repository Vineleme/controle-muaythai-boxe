<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Controle Muay Thai e Boxe</title>
    <link rel="stylesheet" href="./styles.css?v=12" />
  </head>
  <body>
    <section id="loginView" class="login-view" hidden>
      <form id="loginForm" class="login-box">
        <p class="eyebrow">Acesso restrito</p>
        <h1>Entrar no controle</h1>
        <label>
          E-mail
          <input id="loginEmail" type="email" autocomplete="email" required />
        </label>
        <label>
          Senha
          <input id="loginPassword" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Entrar</button>
        <p id="loginMessage" class="login-message"></p>
      </form>
    </section>

    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Controle financeiro</p>
          <h1>Muay Thai e Boxe</h1>
          <p id="accessBadge" class="access-badge"></p>
        </div>
        <div class="actions">
          <button id="saveData" type="button">Salvar alterações</button>
          <button id="addStudent" type="button">Adicionar aluno</button>
          <button id="exportCsv" type="button">Exportar CSV</button>
          <button id="resetData" class="ghost" type="button">Restaurar dados</button>
          <button id="logout" class="ghost" type="button" hidden>Sair</button>
        </div>
      </header>

      <section class="summary-grid" aria-label="Resumo">
        <article class="metric paid">
          <span>Pago</span>
          <strong id="paidTotal">R$ 0,00</strong>
          <small id="paidCount">0 alunos</small>
        </article>
        <article class="metric unpaid">
          <span>Não pago</span>
          <strong id="unpaidTotal">R$ 0,00</strong>
          <small id="unpaidCount">0 alunos</small>
        </article>
        <article class="metric charged">
          <span>Cobrado</span>
          <strong id="chargedTotal">R$ 0,00</strong>
          <small id="chargedCount">0 alunos</small>
        </article>
        <article class="metric overdue">
          <span>Inadimplente</span>
          <strong id="overdueTotal">R$ 0,00</strong>
          <small id="overdueCount">0 alunos</small>
        </article>
      </section>

      <section class="sticky-panel" aria-label="Controles fixos">
        <div class="quick-status" aria-label="Legenda de status">
          <span><i class="dot paid-dot"></i>Pago</span>
          <span><i class="dot charged-dot"></i>Cobrado</span>
          <span><i class="dot overdue-dot"></i>Não pago</span>
          <button id="toggleSearch" class="search-toggle" type="button" aria-expanded="false" aria-controls="searchPanel" aria-label="Buscar">
            <i></i>
            <i></i>
            <i></i>
          </button>
        </div>

        <div id="searchPanel" class="search-panel" hidden>
          <label>
            Buscar
            <input id="searchInput" type="search" placeholder="Nome, turma ou observação" />
          </label>

          <section class="filters" aria-label="Filtros">
            <label>
              Status
              <select id="statusFilter">
                <option value="">Todos</option>
                <option value="Pago">Pago</option>
                <option value="Cobrado">Cobrado</option>
                <option value="Inadimplente">Inadimplente</option>
              </select>
            </label>
            <label>
              Turma
              <select id="classFilter">
                <option value="">Todas</option>
              </select>
            </label>
            <label>
              Categoria
              <select id="categoryFilter">
                <option value="">Todas</option>
                <option value="Mensal">Mensal</option>
                <option value="Semestral">Semestral</option>
                <option value="Anual">Anual</option>
                <option value="TotalPass">TotalPass</option>
              </select>
            </label>
            <label>
              Forma
              <select id="paymentFilter">
                <option value="">Todas</option>
                <option value="Pix/Outros">Pix/Outros</option>
                <option value="Pix">Pix</option>
                <option value="Dinheiro">Dinheiro</option>
                <option value="Cartao de credito">Cartão de crédito</option>
              </select>
            </label>
          </section>
        </div>
      </section>

      <section class="table-wrap" aria-label="Alunos">
        <table>
          <thead>
            <tr>
              <th>Aluno</th>
              <th>Cobrado?</th>
              <th>Pago?</th>
              <th>Status</th>
              <th>Categoria</th>
              <th>Turma</th>
              <th>Valor</th>
              <th>Forma</th>
              <th>Observação</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="studentRows"></tbody>
        </table>
      </section>

      <section id="professorView" class="professor-list" aria-label="Consulta do professor" hidden></section>
    </main>

    <button id="addStudentFab" class="fab" type="button">+ Aluno</button>

    <template id="rowTemplate">
      <tr>
        <td><input class="name-input" data-field="aluno" /></td>
        <td>
          <select data-field="cobrado">
            <option value="Nao">Nao</option>
            <option value="Sim">Sim</option>
          </select>
        </td>
        <td>
          <select data-field="pago">
            <option value="Nao">Nao</option>
            <option value="Sim">Sim</option>
          </select>
        </td>
        <td><span class="status-pill"></span></td>
        <td>
          <select data-field="categoria">
            <option value="Mensal">Mensal</option>
            <option value="Semestral">Semestral</option>
            <option value="Anual">Anual</option>
            <option value="TotalPass">TotalPass</option>
          </select>
        </td>
        <td>
          <select data-field="turma">
            <option value="Muay Thai 08:00">Muay Thai 08:00</option>
            <option value="Boxe 16:30">Boxe 16:30</option>
            <option value="Muay Thai 17:40">Muay Thai 17:40</option>
            <option value="Muay Thai 19:00">Muay Thai 19:00</option>
          </select>
        </td>
        <td><input data-field="valor" inputmode="decimal" /></td>
        <td>
          <select data-field="forma">
            <option value="Pix/Outros">Pix/Outros</option>
            <option value="Pix">Pix</option>
            <option value="Dinheiro">Dinheiro</option>
            <option value="Cartao de credito">Cartão de crédito</option>
          </select>
        </td>
        <td><input data-field="observacao" /></td>
        <td><button class="delete-row" type="button">Remover</button></td>
      </tr>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js?v=1"></script>
    <script src="./data.js?v=4"></script>
    <script src="./app.js?v=12"></script>
  </body>
</html>
